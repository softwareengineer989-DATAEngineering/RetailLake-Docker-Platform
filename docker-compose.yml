services:

  postgres:

    build:
      context: .
      dockerfile: docker/postgres/Dockerfile

    container_name: ${POSTGRES_CONTAINER}

    image: retaillake/postgres:1.0.0

    restart: unless-stopped

    env_file:
      - .env

    environment:

      POSTGRES_DB: ${POSTGRES_DB}

      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:

      - "${POSTGRES_PORT}:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

      - ./postgres/init:/docker-entrypoint-initdb.d

    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER}"
        ]

      interval: 10s

      timeout: 5s

      retries: 5

      start_period: 10s

    networks:

      - retaillake-network


  spark:

    build:

      context: .

      dockerfile: docker/spark/Dockerfile

    image: retaillake/spark:1.0.0

    container_name: retail-spark

    restart: unless-stopped

    depends_on:

      postgres:

        condition: service_healthy

    volumes:

      - ./spark:/app/spark

    networks:

      - retaillake-network


volumes:

  postgres_data:

networks:

  retaillake-network:

    driver: bridge





